<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏝️ Archipelago</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏝️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #d4eef7;
    --grass: #7ec850;
    --grass2: #5faa30;
    --soil: #c8954a;
    --soil2: #a07030;
    --cream: #fef9f0;
    --card: #fffdf7;
    --card2: #fff8e8;
    --border: #e8d5a0;
    --border2: #d4bc7a;
    --text: #5c4a1e;
    --text2: #8c7040;
    --text3: #b89a60;
    --green-ok: #5cb85c;
    --green-ok-bg: #e8f8e8;
    --amber: #e8a020;
    --amber-bg: #fef5e0;
    --red: #e05050;
    --red-bg: #feeaea;
    --blue: #4a9fd4;
    --blue-bg: #e4f2fc;
    --shadow: rgba(100,80,30,0.12);
    --shadow2: rgba(100,80,30,0.22);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -2;
    background: linear-gradient(180deg, #c8e8f8 0%, #d8eefc 40%, #e8f5d8 75%, #c8e880 100%);
  }

  /* ── Clouds ── */
  .cloud { position: fixed; background: white; border-radius: 50px; opacity: 0.75; z-index: -1; }
  .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
  .c1 { width:120px; height:38px; top:8%;  left:-140px; animation: drift 28s linear infinite; }
  .c1::before { width:55px; height:55px; top:-28px; left:15px; }
  .c1::after  { width:38px; height:38px; top:-18px; left:55px; }
  .c2 { width:90px;  height:28px; top:18%; left:-110px; animation: drift 38s linear infinite 8s; opacity:.55; }
  .c2::before { width:40px; height:40px; top:-20px; left:10px; }
  .c2::after  { width:30px; height:30px; top:-14px; left:42px; }
  .c3 { width:150px; height:44px; top:5%;  left:-170px; animation: drift 48s linear infinite 20s; opacity:.6; }
  .c3::before { width:65px; height:65px; top:-35px; left:20px; }
  .c3::after  { width:48px; height:48px; top:-24px; left:75px; }
  @keyframes drift { from{transform:translateX(0)} to{transform:translateX(calc(100vw + 200px))} }

  /* ── Ground ── */
  .ground {
    position: fixed; bottom:0; left:0; right:0; height:80px;
    background: linear-gradient(180deg, var(--grass) 0%, var(--grass2) 60%);
    z-index: -1; border-top: 4px solid var(--grass2);
  }
  .ground::before {
    content: ''; position: absolute; top:-8px; left:0; right:0; height:10px;
    background: repeating-linear-gradient(90deg, var(--grass) 0px, var(--grass) 18px, #8ad458 18px, #8ad458 36px);
    opacity: .5;
  }

  /* ── Flowers ── */
  .flowers {
    position: fixed; bottom:72px; left:0; right:0;
    display: flex; z-index: -1; pointer-events: none;
  }
  .flower { font-size:18px; animation:sway 3s ease-in-out infinite; transform-origin:bottom center; }
  .flower:nth-child(2n) { animation-delay:.5s; }
  .flower:nth-child(3n) { animation-delay:1.1s; }
  .flower:nth-child(4n) { animation-delay:.3s; }
  @keyframes sway { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }

  /* ── Layout ── */
  .wrapper { max-width: 960px; margin: 0 auto; padding: 32px 20px 120px; }

  /* ── Header sign ── */
  .header { text-align: center; margin-bottom: 36px; }

  .header-sign {
    display: inline-block;
    background: var(--soil);
    border-radius: 16px 16px 4px 4px;
    padding: 18px 44px 14px;
    position: relative;
    box-shadow: 0 6px 0 var(--soil2), 0 8px 20px var(--shadow2);
  }
  .header-sign::after {
    content: ''; position: absolute; bottom:-30px; left:50%;
    transform: translateX(-50%);
    width:16px; height:30px; background: var(--soil2); border-radius:0 0 4px 4px;
  }
  .header-nook  { font-size:26px; margin-bottom:6px; }
  .header-title { font-size:28px; font-weight:900; color:#fef9e8; letter-spacing:.02em; text-shadow:2px 3px 0 rgba(0,0,0,.2); line-height:1; }
  .header-sub   { font-size:12px; color:#e8d4a0; font-weight:600; margin-top:4px; letter-spacing:.08em; }

  /* ── Info bar ── */
  .info-bar { display:flex; justify-content:center; gap:20px; margin:44px 0 28px; flex-wrap:wrap; }
  .info-pill {
    background: var(--card); border:2px solid var(--border); border-radius:20px;
    padding:6px 16px; font-size:13px; font-weight:700; color:var(--text);
    box-shadow:0 3px 0 var(--border2), 0 4px 10px var(--shadow);
    display:flex; align-items:center; gap:6px;
  }

  /* ── Section title ── */
  .section-title {
    font-size:13px; font-weight:800; color:var(--text2);
    text-transform:uppercase; letter-spacing:.1em;
    margin-bottom:14px; display:flex; align-items:center; gap:8px;
  }

  /* ── Machine grid ── */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-bottom:28px; }

  .machine-card {
    background: var(--card); border:3px solid var(--border); border-radius:20px;
    padding:18px;
    box-shadow:0 5px 0 var(--border2), 0 7px 18px var(--shadow);
    transition:transform .15s, box-shadow .15s, border-color .3s;
    position:relative; overflow:hidden;
  }
  .machine-card.new-card { animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both; }
  .machine-card:hover { transform:translateY(-2px); box-shadow:0 7px 0 var(--border2), 0 10px 24px var(--shadow2); }
  .machine-card.online  { border-color:#90d878; box-shadow:0 5px 0 #6ab858, 0 7px 18px var(--shadow); }
  .machine-card.offline { border-color:var(--border); }
  .machine-card::before { content:attr(data-emoji); position:absolute; top:10px; right:14px; font-size:28px; opacity:.18; }

  @keyframes popIn { from{transform:scale(.85);opacity:0} to{transform:scale(1);opacity:1} }
  .port-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .port-chip {
    padding:4px 10px; border-radius:16px; border:2px solid var(--border);
    background:var(--cream); font-size:11px; font-weight:800; color:var(--text2);
    cursor:pointer; transition:all .12s; font-family:'Nunito',sans-serif;
  }
  .port-chip:hover { border-color:var(--grass); color:var(--text); }
  .port-chip.selected { border-color:var(--grass2); background:var(--green-ok-bg); color:#3a883a; box-shadow:0 2px 0 #6ab858; }
  .port-custom-row { display:flex; gap:8px; align-items:center; margin-top:6px; }
  .port-custom-row input { width:90px; }
  .machine-card[draggable=true] { cursor: grab; }
  .machine-card[draggable=true]:active { cursor: grabbing; }
  .machine-card.dragging { opacity: .35; transform: scale(.97); box-shadow: none !important; }
  .machine-card.drag-over { outline: 3px dashed var(--grass); outline-offset: 3px; transform: translateY(-4px) scale(1.02); }

  .card-header { display:flex; align-items:flex-start; gap:10px; margin-bottom:12px; }
  .card-icon {
    width:46px; height:46px; border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; flex-shrink:0; border:2px solid var(--border); background:var(--cream);
  }
  .card-name  { font-size:15px; font-weight:800; color:var(--text); line-height:1.2; }
  .card-role  { font-size:11px; color:var(--text3); font-weight:600; margin-top:2px; }

  .status-badge {
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; margin-bottom:10px;
  }
  .status-badge.online   { background:var(--green-ok-bg); color:#3a883a; }
  .status-badge.offline  { background:#f0f0f0;            color:#888; }
  .status-badge.pinging  { background:var(--blue-bg);     color:#3070a0; }
  .status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .online  .status-dot { background:var(--green-ok); animation:blink 2s ease-in-out infinite; }
  .offline .status-dot { background:#aaa; }
  .pinging .status-dot { background:var(--blue); animation:blink .6s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  .card-meta { font-size:10px; color:var(--text3); font-weight:600; line-height:2; margin-bottom:8px; font-family:'Nunito Sans',sans-serif; }
  .card-meta span { color:var(--text2); font-weight:700; }

  .card-ping { font-size:10px; color:var(--text3); font-weight:600; margin-bottom:12px; }
  .card-ping.good { color:var(--green-ok); }
  .card-ping.slow { color:var(--amber); }
  .card-ping.none { color:#aaa; }

  /* ── Card action buttons ── */
  .card-actions { display:flex; gap:7px; flex-wrap:wrap; }

  .btn {
    flex:1; min-width:0; padding:8px 4px;
    border-radius:12px; font-family:'Nunito',sans-serif;
    font-size:11px; font-weight:800; border:2.5px solid;
    cursor:pointer; transition:all .12s;
    display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .btn:active { transform:translateY(2px); }
  .btn:disabled { opacity:.35; cursor:not-allowed; }

  .btn-wake   { color:#3a883a; border-color:#90d878; background:var(--green-ok-bg); box-shadow:0 3px 0 #6ab858; }
  .btn-wake:hover:not(:disabled)     { background:#d0f0d0; border-color:var(--green-ok); box-shadow:0 4px 0 #5a9a5a; }
  .btn-sleep  { color:#b87818; border-color:#f0c858; background:var(--amber-bg);    box-shadow:0 3px 0 #c8a030; }
  .btn-sleep:hover:not(:disabled)    { background:#fdecc0; border-color:var(--amber); }
  .btn-reboot { color:#3070a0; border-color:#90c8f0; background:var(--blue-bg);     box-shadow:0 3px 0 #5090c0; }
  .btn-reboot:hover:not(:disabled)   { background:#c8e8fc; border-color:var(--blue); }
  .btn-remove { flex:0; padding:8px 10px; color:var(--red); border-color:#f0b0b0; background:var(--red-bg); box-shadow:0 3px 0 #d09090; border-radius:12px; font-size:13px; }
  .btn-remove:hover { background:#fddcdc; }
  .btn-edit { flex:0; padding:8px 10px; color:#3070a0; border-color:#90c8f0; background:var(--blue-bg); box-shadow:0 3px 0 #5090c0; border-radius:12px; font-size:13px; }
  .btn-edit:hover { background:#c8e8fc; }

  /* Wobble on wake */
  @keyframes wobble {
    0%,100%{transform:rotate(0)} 20%{transform:rotate(-8deg)} 40%{transform:rotate(8deg)}
    60%{transform:rotate(-5deg)} 80%{transform:rotate(5deg)}
  }
  .wobble { animation:wobble .5s ease-in-out; }

  /* ── Confirm overlay inside card ── */
  .card-confirm {
    display:none; position:absolute; inset:0; border-radius:18px;
    background:rgba(255,253,247,.96); backdrop-filter:blur(2px);
    flex-direction:column; align-items:center; justify-content:center;
    gap:12px; padding:18px; text-align:center; z-index:10;
    animation:popIn .2s cubic-bezier(.34,1.56,.64,1) both;
  }
  .card-confirm.show { display:flex; }
  .confirm-q { font-size:13px; font-weight:800; color:var(--text); line-height:1.4; }
  .confirm-btns { display:flex; gap:8px; width:100%; }
  .confirm-yes { flex:1; padding:9px; border-radius:10px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:900; border:2.5px solid; cursor:pointer; transition:all .12s; }
  .confirm-yes.shutdown { background:var(--red-bg);  color:#b83030; border-color:#f0a0a0; }
  .confirm-yes.reboot   { background:var(--blue-bg); color:#3070a0; border-color:#90c8f0; }
  .confirm-no  { flex:1; padding:9px; border-radius:10px; font-family:'Nunito',sans-serif; font-size:12px; font-weight:900; border:2.5px solid var(--border); background:white; color:var(--text2); cursor:pointer; }
  .confirm-no:hover { background:var(--cream); }

  /* ── Log panel ── */
  .log-card { background:var(--card2); border:3px solid var(--border); border-radius:20px; padding:20px; box-shadow:0 5px 0 var(--border2), 0 7px 18px var(--shadow); margin-bottom:20px; }
  .log-entries { display:flex; flex-direction:column; gap:7px; max-height:150px; overflow-y:auto; padding-right:4px; }
  .log-entries::-webkit-scrollbar { width:5px; }
  .log-entries::-webkit-scrollbar-track { background:var(--cream); border-radius:10px; }
  .log-entries::-webkit-scrollbar-thumb { background:var(--border2); border-radius:10px; }
  .log-entry { display:flex; gap:10px; align-items:flex-start; font-size:11px; line-height:1.4; }
  .log-icon { font-size:13px; flex-shrink:0; }
  .log-time { color:var(--text3); font-weight:600; flex-shrink:0; font-family:'Nunito Sans',sans-serif; }
  .log-msg  { color:var(--text2); font-weight:600; }
  .log-msg.ok   { color:#3a883a; }
  .log-msg.warn { color:#b87818; }
  .log-msg.err  { color:var(--red); }

  /* ── Add machine form ── */
  .add-card { background:var(--card); border:3px solid var(--border); border-radius:20px; padding:22px; box-shadow:0 5px 0 var(--border2), 0 7px 18px var(--shadow); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
  @media(max-width:500px) { .form-grid { grid-template-columns:1fr; } }
  .form-group { display:flex; flex-direction:column; gap:5px; }
  label { font-size:11px; font-weight:800; color:var(--text2); letter-spacing:.06em; text-transform:uppercase; }
  input {
    background:var(--cream); border:2.5px solid var(--border); border-radius:10px;
    color:var(--text); font-family:'Nunito',sans-serif; font-size:13px; font-weight:600;
    padding:9px 12px; outline:none; transition:border-color .15s, box-shadow .15s; width:100%;
  }
  input:focus { border-color:var(--grass); box-shadow:0 0 0 3px rgba(126,200,80,.18); }
  input::placeholder { color:var(--text3); }

  .emoji-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
  .emoji-pick {
    width:36px; height:36px; border-radius:10px; border:2.5px solid var(--border);
    background:var(--cream); font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:all .12s;
  }
  .emoji-pick:hover { border-color:var(--grass); transform:scale(1.1); }
  .emoji-pick.selected { border-color:var(--grass); background:var(--green-ok-bg); box-shadow:0 2px 0 #6ab858; }

  .btn-add {
    width:100%; padding:12px; border-radius:14px; font-family:'Nunito',sans-serif;
    font-size:14px; font-weight:900; border:3px solid var(--grass2);
    background:var(--grass); color:white; cursor:pointer;
    text-shadow:0 1px 2px rgba(0,0,0,.2);
    box-shadow:0 4px 0 var(--grass2), 0 5px 12px var(--shadow); transition:all .12s;
  }
  .btn-add:hover { background:#8ad860; transform:translateY(-1px); box-shadow:0 5px 0 var(--grass2), 0 7px 16px var(--shadow2); }
  .btn-add:active { transform:translateY(2px); box-shadow:0 2px 0 var(--grass2); }

  /* ── Empty state ── */
  .empty-state { text-align:center; padding:40px 20px; color:var(--text3); font-size:14px; font-weight:700; grid-column:1/-1; }
  .empty-state .emoji { font-size:40px; display:block; margin-bottom:10px; }
</style>
</head>
<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>
<div class="ground"></div>
<div class="flowers" id="flowers"></div>

<div class="wrapper">

  <div class="header">
    <div class="header-sign">
      <div class="header-nook">🏝️</div>
      <div class="header-title">Archipelago</div>
      <div class="header-sub">wake · sleep · reboot · ping</div>
    </div>
  </div>

  <div class="info-bar">
    <div class="info-pill" id="clockPill">🕐 --:--</div>
    <div class="info-pill" id="onlineCount">💻 0 online</div>
    <div class="info-pill" id="totalCount">🏠 0 machines</div>
  </div>

  <div class="section-title">🌿 Your machines</div>
  <div class="grid" id="machineGrid"></div>

  <div class="log-card">
    <div class="section-title" style="margin-bottom:12px">📜 Bulletin</div>
    <div class="log-entries" id="logEntries"></div>
  </div>

  <div class="add-card">
    <div class="section-title" style="margin-bottom:16px">✨ Add a New island to the Archipelago</div>
    <div class="form-grid">
      <div class="form-group">
        <label>🏷️ Name</label>
        <input type="text" id="inputName" placeholder="e.g. nas-01">
      </div>
      <div class="form-group">
        <label>🗂️ Role</label>
        <input type="text" id="inputRole" placeholder="e.g. NAS, HPC, Miner">
      </div>
      <div class="form-group">
        <label>🔌 MAC Address</label>
        <input type="text" id="inputMac" placeholder="AA:BB:CC:DD:EE:FF">
      </div>
      <div class="form-group">
        <label>📡 IP Address</label>
        <input type="text" id="inputIp" placeholder="100.x.x.x">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>🔗 Link <span style="font-weight:600;text-transform:none;letter-spacing:0;color:var(--text3)">(optional — e.g. http://100.x.x.x:8080)</span></label>
        <input type="text" id="inputLink" placeholder="http://...">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>🔌 Ports to monitor <span style="font-weight:600;text-transform:none;letter-spacing:0;color:var(--text3)">(optional — falls back to 22, 80, 443)</span></label>
        <div class="port-chips" id="addPortChips"></div>
        <div class="port-custom-row">
          <input type="text" id="addPortCustom" placeholder="custom port..." style="width:130px;">
          <button type="button" onclick="addCustomPort('add')" style="padding:7px 13px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;border:2px solid var(--grass2);background:var(--grass);color:white;cursor:pointer;">+ Add</button>
        </div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>🎨 Pick an icon</label>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <div class="emoji-row" id="emojiPicker"></div>
        <button type="button" onclick="openEmojiModal('add')" style="padding:4px 10px;border-radius:8px;border:2px dashed var(--border2);background:var(--cream);font-size:11px;font-weight:800;color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;">more…</button>
      </div>
    </div>
    <button class="btn-add" onclick="addMachine()">🏡 Welcome to the Archipelago!</button>
  </div>

</div>

<!-- ── Edit modal ── -->
<div id="editModal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(100,80,30,.35);backdrop-filter:blur(3px);align-items:center;justify-content:center;">
  <div style="background:var(--card);border:3px solid var(--border);border-radius:20px;padding:26px 28px;max-width:420px;width:calc(100% - 32px);box-shadow:0 8px 0 var(--border2),0 12px 36px rgba(100,80,30,.22);">
    <div style="font-size:15px;font-weight:900;color:var(--text);margin-bottom:18px;">✏️ Edit Machine</div>
    <div class="form-grid">
      <div class="form-group">
        <label>🏷️ Name</label>
        <input type="text" id="editName" placeholder="e.g. nas-01">
      </div>
      <div class="form-group">
        <label>🗂️ Role</label>
        <input type="text" id="editRole" placeholder="e.g. NAS, Gaming PC">
      </div>
      <div class="form-group">
        <label>🔌 MAC Address</label>
        <input type="text" id="editMac" placeholder="AA:BB:CC:DD:EE:FF">
      </div>
      <div class="form-group">
        <label>📡 IP Address</label>
        <input type="text" id="editIp" placeholder="100.x.x.x">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>🔗 Link <span style="font-weight:600;text-transform:none;letter-spacing:0;color:var(--text3)">(optional)</span></label>
        <input type="text" id="editLink" placeholder="http://...">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <label>🔌 Ports to monitor <span style="font-weight:600;text-transform:none;letter-spacing:0;color:var(--text3)">(optional — falls back to 22, 80, 443)</span></label>
        <div class="port-chips" id="editPortChips"></div>
        <div class="port-custom-row">
          <input type="text" id="editPortCustom" placeholder="custom port..." style="width:130px;">
          <button type="button" onclick="addCustomPort('edit')" style="padding:7px 13px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;border:2px solid var(--grass2);background:var(--grass);color:white;cursor:pointer;">+ Add</button>
        </div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:18px;">
      <label>🎨 Pick an icon</label>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <div class="emoji-row" id="editEmojiPicker"></div>
        <button type="button" onclick="openEmojiModal('edit')" style="padding:4px 10px;border-radius:8px;border:2px dashed var(--border2);background:var(--cream);font-size:11px;font-weight:800;color:var(--text2);cursor:pointer;font-family:'Nunito',sans-serif;">more…</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn-add" style="flex:1" onclick="saveEdit()">💾 Save Changes</button>
      <button onclick="closeEditModal()" style="padding:12px 16px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;border:2.5px solid var(--border);background:white;color:var(--text2);cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<script>
const API_BASE = '';
const PING_INTERVAL_MS = 15000;
const EMOJIS = ['🎬','🎵','📺','💾','📊','🖥️','💻','🌐','📦','⭐','🏝️'];
let selectedEmoji = EMOJIS[0];

let machines   = [];
let logs       = [];
let nextId     = 1;
let pingTimers = {};

// ── Init ──────────────────────────────────────────────────────────
buildEmojiPicker();
buildFlowers();
startClock();
loadMachines();

// ── Delegated click handler for all card buttons ──────────────────
// Handles wake / sleep / reboot / remove without any inline onclick
// quote-nesting issues.
document.getElementById('machineGrid').addEventListener('click', function(e) {
  const btn = e.target.closest('button[data-action]');
  if (!btn || btn.disabled) return;
  const id     = parseInt(btn.dataset.id);
  const action = btn.dataset.action;
  if      (action === 'wake')   wakeDevice(id);
  else if (action === 'sleep')  askConfirm(id, 'sleep');
  else if (action === 'reboot') askConfirm(id, 'reboot');
  else if (action === 'edit')   openEditModal(id);
  else if (action === 'remove') removeMachine(id);
});

// ── Port chips ────────────────────────────────────────────────────
const COMMON_PORTS = [22, 80, 443, 8080, 8096, 8123, 9000, 32400];
let addSelectedPorts  = [];
let editSelectedPorts = [];
buildPortChips('addPortChips', addSelectedPorts, 'add');

function buildPortChips(containerId, selectedPorts, context) {
  const row = document.getElementById(containerId);
  row.innerHTML = '';
  // Common port chips
  COMMON_PORTS.forEach(p => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'port-chip' + (selectedPorts.includes(p) ? ' selected' : '');
    chip.textContent = p;
    chip.onclick = () => togglePort(p, context);
    row.appendChild(chip);
  });
  // Any custom ports already selected that aren't in COMMON_PORTS
  selectedPorts.filter(p => !COMMON_PORTS.includes(p)).forEach(p => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'port-chip selected';
    chip.textContent = p;
    chip.onclick = () => togglePort(p, context);
    row.appendChild(chip);
  });
}

function togglePort(port, context) {
  const arr = context === 'edit' ? editSelectedPorts : addSelectedPorts;
  const idx = arr.indexOf(port);
  if (idx === -1) arr.push(port); else arr.splice(idx, 1);
  buildPortChips(context === 'edit' ? 'editPortChips' : 'addPortChips', arr, context);
}

function addCustomPort(context) {
  const inputId = context === 'edit' ? 'editPortCustom' : 'addPortCustom';
  const val = parseInt(document.getElementById(inputId).value.trim());
  if (!val || val < 1 || val > 65535) return;
  const arr = context === 'edit' ? editSelectedPorts : addSelectedPorts;
  if (!arr.includes(val)) arr.push(val);
  document.getElementById(inputId).value = '';
  buildPortChips(context === 'edit' ? 'editPortChips' : 'addPortChips', arr, context);
}

const EMOJI_CATEGORIES = [
  { label: '⭐ Favourites',  emojis: ['⭐','🔥','💎','🏆','🎯','✨','💡','🔑'] },
  { label: '💻 Tech',        emojis: ['🖥️','💻','📱','⌨️','🖱️','🖨️','💾','💿','📡','🔌','🔋','📶','🛜','🧮','⚙️','🔧','🔩','🛠️'] },
  { label: '🎬 Media',       emojis: ['🎬','📺','🎵','🎧','🎙️','📻','🎮','🕹️','📷','📸','📽️','🎞️','🎭','🎨'] },
  { label: '🏠 Home',        emojis: ['🏠','🏡','🛋️','🪑','🛏️','🚪','🪟','💡','🔦','🕯️','🧹','🪣','🧺','🪴'] },
  { label: '📦 Files',       emojis: ['📦','📁','📂','🗂️','📄','📋','📊','📈','📉','🗄️','🗃️','📰','📚','📖','📝'] },
  { label: '🌿 Nature',      emojis: ['🌿','🌱','🌳','🌲','🍀','🌸','🌺','🌻','🌙','☀️','🌈','❄️','🔥','💧','🌊','🏝️','⛅','🌍'] },
  { label: '🔒 Security',    emojis: ['🔒','🔓','🔐','🛡️','🔑','🗝️','👁️','⚠️','🚨','🚦'] },
  { label: '🚀 Network',     emojis: ['🚀','🛰️','📡','🌐','🔗','⛓️','🗺️','🧭','📍','🏴'] },
  { label: '🧸 Fun',         emojis: ['🧸','🎲','🧩','🎪','🎠','🪆','🎁','🎀','🪄','🎩','🃏','♟️'] },
];

let emojiModalCaller = 'add';

function openEmojiModal(caller) {
  emojiModalCaller = caller;
  const body = document.getElementById('emojiModalBody');
  body.innerHTML = '';
  EMOJI_CATEGORIES.forEach(cat => {
    const heading = document.createElement('div');
    heading.style.cssText = 'font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:12px 0 6px;padding-bottom:4px;border-bottom:2px solid var(--border);';
    heading.textContent = cat.label;
    body.appendChild(heading);
    const grid = document.createElement('div');
    grid.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;';
    cat.emojis.forEach(e => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'emoji-pick';
      btn.textContent = e;
      btn.onclick = () => selectEmojiFromModal(e);
      grid.appendChild(btn);
    });
    body.appendChild(grid);
  });
  document.getElementById('emojiModal').style.display = 'flex';
}

function closeEmojiModal() {
  document.getElementById('emojiModal').style.display = 'none';
}

function selectEmojiFromModal(e) {
  if (emojiModalCaller === 'edit') {
    editSelectedEmoji = e;
    document.querySelectorAll('#editEmojiPicker .emoji-pick').forEach(b => b.classList.remove('selected'));
  } else {
    selectedEmoji = e;
    document.querySelectorAll('#emojiPicker .emoji-pick').forEach(b => b.classList.remove('selected'));
  }
  closeEmojiModal();
}

function buildEmojiPicker() {
  const row = document.getElementById('emojiPicker');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-pick' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e; btn.type = 'button';
    btn.onclick = () => {
      selectedEmoji = e;
      document.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    row.appendChild(btn);
  });
}

function buildFlowers() {
  const row = document.getElementById('flowers');
  const f = ['🌸','🌼','🌺','🌻','🌷'];
  const targetWidth = window.innerWidth * (3/4);
  const gap = () => Math.floor(Math.random() * 20 + 8);

  row.style.justifyContent = 'center';

  let totalWidth = 0;
  while (totalWidth < targetWidth) {
    const el = document.createElement('span');
    el.className = 'flower';
    el.textContent = f[Math.floor(Math.random() * f.length)];
    const margin = gap();
    el.style.marginLeft = margin + 'px';
    el.style.marginRight = margin + 'px';
    row.appendChild(el);
    totalWidth += 36 + (margin * 2); // emoji ~36px wide + both margins
  }
}
window.addEventListener('resize', () => {
  document.getElementById('flowers').innerHTML = '';
  buildFlowers();
});

function startClock() {
  const tick = () => {
    document.getElementById('clockPill').textContent =
      '🕐 ' + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  };
  tick(); setInterval(tick, 1000);
}

// ── Render ────────────────────────────────────────────────────────
// renderAll does a full rebuild — only called on page load, add, and remove.
// setStatus does a surgical in-place update so cards never flash.
function renderAll() { renderMachines(); renderLogs(); updateSummary(); }

function renderMachines(newId) {
  const grid = document.getElementById('machineGrid');
  if (!machines.length) {
    grid.innerHTML = '<div class="empty-state"><span class="emoji">🏝️</span>Your archipelago is empty!<br>Add a machine below.</div>';
    return;
  }
  grid.innerHTML = machines.map(m => cardHTML(m, m.id === newId)).join('');
  grid.querySelectorAll('.machine-card').forEach(card => {
    card.addEventListener('dragstart', onCardDragStart);
    card.addEventListener('dragend',   onCardDragEnd);
    card.addEventListener('dragover',  onCardDragOver);
    card.addEventListener('dragleave', onCardDragLeave);
    card.addEventListener('drop',      onCardDrop);
  });
}

function makeActionsHTML(id, on) {
  // Use data-id and data-action attributes to avoid all quote-nesting issues.
  // A single delegated listener on the grid handles all clicks.
  return (
    '<button class="btn btn-wake"   data-action="wake"   data-id="' + id + '"' + (on  ? ' disabled' : '') + '>☀️ Wake</button>' +
    '<button class="btn btn-sleep"  data-action="sleep"  data-id="' + id + '"' + (!on ? ' disabled' : '') + '>🌙 Sleep</button>' +
    '<button class="btn btn-reboot" data-action="reboot" data-id="' + id + '"' + (!on ? ' disabled' : '') + '>🔄 Reboot</button>' +
    '<button class="btn btn-edit   btn" data-action="edit"   data-id="' + id + '" title="Edit">✏️</button>' +
    '<button class="btn btn-remove" data-action="remove" data-id="' + id + '" title="Remove">✕</button>'
  );
}

function cardHTML(m, isNew) {
  const on = m.status === 'online';
  const nameHTML = m.link
    ? '<a href="' + m.link + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none;border-bottom:2px solid #d4bc7a" onmouseover="this.style.borderColor=\'#7ec850\'" onmouseout="this.style.borderColor=\'#d4bc7a\'">' + m.name + ' 🔗</a>'
    : m.name;
  return (
    '<div class="machine-card ' + m.status + (isNew ? ' new-card' : '') + '" id="card-' + m.id + '" data-emoji="' + (m.emoji||'🖥️') + '" draggable="true">' +
      '<div class="card-confirm" id="confirm-' + m.id + '">' +
        '<div class="confirm-q" id="confirm-q-' + m.id + '"></div>' +
        '<div class="confirm-btns">' +
          '<button class="confirm-yes" id="confirm-yes-' + m.id + '">Yes, do it</button>' +
          '<button class="confirm-no" onclick="cancelConfirm(' + m.id + ')">Nevermind</button>' +
        '</div>' +
      '</div>' +
      '<div class="card-header">' +
        '<div class="card-icon">' + (m.emoji||'🖥️') + '</div>' +
        '<div>' +
          '<div class="card-name">' + nameHTML + '</div>' +
          '<div class="card-role">' + m.role + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="status-badge ' + m.status + '" id="badge-' + m.id + '"><span class="status-dot"></span>' + statusLabel(m.status) + '</div>' +
      '<div class="card-meta">MAC&nbsp; <span>' + m.mac + '</span><br>IP&nbsp;&nbsp;&nbsp; <span>' + m.ip + '</span>' + (m.ports && m.ports.length ? '<br>Ports <span>' + m.ports.join(', ') + '</span>' : '') + '</div>' +
      '<div class="card-ping ' + pingClass(m.ping) + '" id="ping-' + m.id + '">' + pingLabel(m.ping) + '</div>' +
      '<div class="card-actions" id="actions-' + m.id + '">' + makeActionsHTML(m.id, on) + '</div>' +
    '</div>'
  );
}

// ── Drag to reorder ───────────────────────────────────────────────
let dragCardId = null;

function onCardDragStart(e) {
  dragCardId = parseInt(this.dataset.id || this.id.replace('card-', ''));
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onCardDragEnd(e) {
  dragCardId = null;
  this.classList.remove('dragging');
  document.querySelectorAll('.machine-card.drag-over').forEach(c => c.classList.remove('drag-over'));
}

function onCardDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const targetId = parseInt(this.dataset.id || this.id.replace('card-', ''));
  if (targetId !== dragCardId) this.classList.add('drag-over');
}

function onCardDragLeave(e) {
  this.classList.remove('drag-over');
}

function onCardDrop(e) {
  e.preventDefault();
  this.classList.remove('drag-over');
  const targetId = parseInt(this.dataset.id || this.id.replace('card-', ''));
  if (!dragCardId || targetId === dragCardId) return;
  const fromIdx = machines.findIndex(m => m.id === dragCardId);
  const toIdx   = machines.findIndex(m => m.id === targetId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = machines.splice(fromIdx, 1);
  machines.splice(toIdx, 0, moved);
  save();
  renderMachines();
}

function updateCardInPlace(m) {
  const card = document.getElementById('card-' + m.id);
  if (!card) return false;
  card.className = 'machine-card ' + m.status;
  const badge = document.getElementById('badge-' + m.id);
  if (badge) { badge.className = 'status-badge ' + m.status; badge.innerHTML = '<span class="status-dot"></span>' + statusLabel(m.status); }
  const pingEl = document.getElementById('ping-' + m.id);
  if (pingEl) { pingEl.className = 'card-ping ' + pingClass(m.ping); pingEl.textContent = pingLabel(m.ping); }
  const actions = document.getElementById('actions-' + m.id);
  if (actions) actions.innerHTML = makeActionsHTML(m.id, m.status === 'online');
  return true;
}
function statusLabel(s) {
  return {online:'Online 🌿', offline:'Offline 🌑', pinging:'Checking... 🔍'}[s] || s;
}
function pingClass(p) { return (p === null || p === undefined || p < 0) ? 'none' : p < 20 ? 'good' : 'slow'; }
function pingLabel(p) { return (p === null || p === undefined || p < 0) ? '🏓 Ping: —' : '🏓 Ping: ' + p + 'ms'; }

function renderLogs() {
  const el = document.getElementById('logEntries');
  if (!logs.length) {
    el.innerHTML = '<div class="log-entry"><span class="log-icon">📭</span><span class="log-msg">Nothing yet today...</span></div>';
    return;
  }
  el.innerHTML = [...logs].reverse().slice(0,30).map(l =>
    '<div class="log-entry">' +
      '<span class="log-icon">' + l.icon + '</span>' +
      '<span class="log-time">' + l.time + '</span>' +
      '<span class="log-msg ' + l.type + '">' + l.msg + '</span>' +
    '</div>'
  ).join('');
}

function updateSummary() {
  const on = machines.filter(m => m.status === 'online').length;
  document.getElementById('onlineCount').textContent = '💻 ' + on + ' online';
  document.getElementById('totalCount').textContent  = '🏠 ' + machines.length + ' machine' + (machines.length !== 1 ? 's' : '');
}

function addLog(msg, type, icon) {
  type = type || 'ok'; icon = icon || '📝';
  logs.push({ time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}), msg, type, icon });
  renderLogs();
}

async function save() {
  try {
    await fetch('/api/machines', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(machines)
    });
  } catch(e) {
    console.error('Failed to save machines:', e);
  }
}

async function loadMachines() {
  try {
    const res  = await fetch('/api/machines');
    const data = await res.json();
    machines = data;
    // Derive nextId from highest existing id
    nextId = machines.reduce((max, m) => Math.max(max, m.id + 1), 1);
    renderAll();
    machines.forEach(m => schedulePing(m.id));
  } catch(e) {
    console.error('Failed to load machines:', e);
    renderAll();
  }
}

// ── Status update — surgical, no full re-render ───────────────────
// Note: setStatus does NOT call save() — status and ping are transient
// and don't need to be persisted. Only add/remove trigger a save.
function setStatus(id, status, ping) {
  const m = machines.find(x => x.id === id); if (!m) return;
  m.status = status;
  if (ping !== undefined) m.ping = ping;
  if (!updateCardInPlace(m)) renderAll();
  updateSummary();
}

// ── Confirm overlay ───────────────────────────────────────────────
const confirmCfg = {
  sleep:  { q:'🌙 Really shut this machine down?', cls:'shutdown', label:'🌙 Yes, sleep it'  },
  reboot: { q:'🔄 Really reboot this machine?',    cls:'reboot',   label:'🔄 Yes, reboot it' },
};

function askConfirm(id, action) {
  const cfg      = confirmCfg[action];
  const overlay  = document.getElementById('confirm-' + id);
  const question = document.getElementById('confirm-q-' + id);
  const yesBtn   = document.getElementById('confirm-yes-' + id);
  question.textContent = cfg.q;
  yesBtn.className  = 'confirm-yes ' + cfg.cls;
  yesBtn.textContent = cfg.label;
  yesBtn.onclick = function() { cancelConfirm(id); execAction(id, action); };
  overlay.classList.add('show');
}

function cancelConfirm(id) {
  const overlay = document.getElementById('confirm-' + id);
  if (overlay) overlay.classList.remove('show');
}

// ── Wake ──────────────────────────────────────────────────────────
async function wakeDevice(id) {
  const m = machines.find(x => x.id === id); if (!m) return;
  const card = document.getElementById('card-' + id);
  if (card) { card.classList.add('wobble'); setTimeout(function(){ card.classList.remove('wobble'); }, 500); }
  setStatus(id, 'pinging');
  addLog('Sending wake-up to ' + m.name + '...', 'ok', '☀️');
  try {
    const res  = await fetch(API_BASE + '/api/wake', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mac:m.mac, ip:m.ip}) });
    const data = await res.json();
    if (data.ok) {
      addLog('Magic packet sent to ' + m.name + '! Waiting... 🌿', 'ok', '🌿');
      pollUntilOnline(id, 30);
    } else {
      addLog('Could not wake ' + m.name + ': ' + data.error, 'err', '😢');
      setStatus(id, 'offline');
    }
  } catch(e) {
    addLog('API error — is the server running?', 'err', '⚠️');
    setStatus(id, 'offline');
  }
}

// ── Sleep / Reboot ────────────────────────────────────────────────
async function execAction(id, action) {
  const m = machines.find(x => x.id === id); if (!m) return;
  const isSleep = action === 'sleep';
  addLog((isSleep ? 'Shutting down ' : 'Rebooting ') + m.name + '...', 'warn', isSleep ? '🌙' : '🔄');
  setStatus(id, 'pinging');
  try {
    const endpoint = isSleep ? '/api/sleep' : '/api/reboot';
    const res  = await fetch(API_BASE + endpoint, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ip:m.ip}) });
    const data = await res.json();
    if (data.ok) {
      addLog(m.name + (isSleep ? ' is going to sleep 💤' : ' is rebooting 🔄'), 'warn', isSleep ? '🌙' : '🔄');
      if (isSleep) {
        setTimeout(function(){ setStatus(id,'offline'); pingDevice(id); }, 8000);
      } else {
        setTimeout(function(){ pollUntilOnline(id, 20); }, 12000);
      }
    } else {
      addLog('Failed on ' + m.name + ': ' + data.error, 'err', '😢');
      setStatus(id, 'online');
    }
  } catch(e) {
    addLog('API error — is the server running?', 'err', '⚠️');
    setStatus(id, 'online');
  }
}

// ── Ping ──────────────────────────────────────────────────────────
async function pingDevice(id) {
  const m = machines.find(x => x.id === id); if (!m) return;
  try {
    const res  = await fetch(API_BASE + '/api/ping', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ip:m.ip, ports:m.ports||[]}) });
    const data = await res.json();
    const wasOnline = m.status === 'online';
    const nowOnline = data.alive;
    if (nowOnline && !wasOnline && m.status !== 'pinging') addLog(m.name + ' just came online! 🎉', 'ok', '🌿');
    else if (!nowOnline && wasOnline) addLog(m.name + ' went offline.', 'warn', '🌑');
    setStatus(id, nowOnline ? 'online' : 'offline', data.ping_ms !== undefined ? data.ping_ms : -1);
  } catch(e) { /* silent */ }
}

function schedulePing(id) {
  if (pingTimers[id]) clearInterval(pingTimers[id]);
  pingDevice(id);
  pingTimers[id] = setInterval(function(){ pingDevice(id); }, PING_INTERVAL_MS);
}

function pollUntilOnline(id, left) {
  if (left <= 0) { addLog('Gave up waiting for machine to come back.', 'warn', '⏰'); setStatus(id,'offline'); return; }
  setTimeout(async function() {
    await pingDevice(id);
    const m = machines.find(x => x.id === id);
    if (m && m.status !== 'online') pollUntilOnline(id, left - 1);
  }, 3000);
}

// ── Edit modal ────────────────────────────────────────────────────
let editingId = null;
let editSelectedEmoji = EMOJIS[0];

function buildEditEmojiPicker(current) {
  const row = document.getElementById('editEmojiPicker');
  row.innerHTML = '';
  editSelectedEmoji = current || EMOJIS[0];
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-pick' + (e === editSelectedEmoji ? ' selected' : '');
    btn.textContent = e; btn.type = 'button';
    btn.onclick = () => {
      editSelectedEmoji = e;
      row.querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    row.appendChild(btn);
  });
}

function openEditModal(id) {
  const m = machines.find(x => x.id === id); if (!m) return;
  editingId = id;
  document.getElementById('editName').value = m.name || '';
  document.getElementById('editRole').value = m.role || '';
  document.getElementById('editMac').value  = m.mac  || '';
  document.getElementById('editIp').value   = m.ip   || '';
  document.getElementById('editLink').value = m.link || '';
  editSelectedPorts = (m.ports || []).slice();
  buildPortChips('editPortChips', editSelectedPorts, 'edit');
  buildEditEmojiPicker(m.emoji);
  const modal = document.getElementById('editModal');
  modal.style.display = 'flex';
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  editingId = null;
}

function saveEdit() {
  const m = machines.find(x => x.id === editingId); if (!m) return;
  const name = document.getElementById('editName').value.trim();
  const mac  = document.getElementById('editMac').value.trim();
  const ip   = document.getElementById('editIp').value.trim();
  if (!name || !mac || !ip) { addLog('Name, MAC, and IP are required! 📋', 'err', '⚠️'); return; }
  const linkRaw = document.getElementById('editLink').value.trim();
  const link = linkRaw && !linkRaw.match(/^https?:\/\//) ? 'http://' + linkRaw : linkRaw;
  m.name  = name;
  m.role  = document.getElementById('editRole').value.trim() || 'Machine';
  m.mac   = mac;
  m.ip    = ip;
  m.link  = link;
  m.ports = editSelectedPorts.slice();
  m.emoji = editSelectedEmoji;
  save();
  addLog(name + ' details updated! ✏️', 'ok', '✏️');
  closeEditModal();
  renderAll();
}

// Close modal when clicking the backdrop
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('removeModal').addEventListener('click', function(e) {
    if (e.target === this) closeRemoveModal();
  });
  document.getElementById('emojiModal').addEventListener('click', function(e) {
    if (e.target === this) closeEmojiModal();
  });
});

// ── Add / Remove ──────────────────────────────────────────────────
function addMachine() {
  const name = document.getElementById('inputName').value.trim();
  const role = document.getElementById('inputRole').value.trim();
  const mac  = document.getElementById('inputMac').value.trim();
  const ip   = document.getElementById('inputIp').value.trim();
  const linkRaw = document.getElementById('inputLink').value.trim();
  // Ensure the link is absolute so the browser doesn't treat it as relative
  const link = linkRaw && !linkRaw.match(/^https?:\/\//) ? 'http://' + linkRaw : linkRaw;
  if (!name || !mac || !ip) { addLog('Fill in Name, MAC, and Tailscale IP first! 📋','err','⚠️'); return; }
  const m = { id:nextId++, name, role:role||'Machine', mac, ip, link:link||'', emoji:selectedEmoji, ports:addSelectedPorts.slice(), status:'offline', ping:null };
  machines.push(m); save();
  addSelectedPorts = [];
  buildPortChips('addPortChips', addSelectedPorts, 'add');
  addLog(name + ' joined the archipelago! Welcome! 🎉', 'ok', '🏝️');
  renderMachines(m.id);
  updateSummary();
  schedulePing(m.id);
  ['inputName','inputRole','inputMac','inputIp','inputLink'].forEach(function(fid){ document.getElementById(fid).value = ''; });
}

let removeTargetId = null;

function removeMachine(id) {
  const m = machines.find(x => x.id === id); if (!m) return;
  removeTargetId = id;
  document.getElementById('removeModalTitle').textContent = 'Move ' + m.name + ' off the archipelago?';
  document.getElementById('removeModalSub').textContent = m.role + ' · ' + m.ip;
  document.getElementById('removeModal').style.display = 'flex';
}

function closeRemoveModal() {
  document.getElementById('removeModal').style.display = 'none';
  removeTargetId = null;
}

function confirmRemove() {
  if (!removeTargetId) return;
  const id = removeTargetId;
  const m = machines.find(x => x.id === id); if (!m) return;
  clearInterval(pingTimers[id]); delete pingTimers[id];
  machines = machines.filter(x => x.id !== id); save();
  addLog(m.name + ' left the archipelago. Bye! 👋', 'warn', '🏝️');
  closeRemoveModal();
  renderAll();
}
</script>

      <button onclick="closeEmojiModal()" style="padding:4px 12px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;border:2px solid var(--border);background:var(--cream);color:var(--text2);cursor:pointer;">✕ Close</button>
    </div>
    <div id="emojiModalBody" style="overflow-y:auto;flex:1;padding-right:4px;"></div>

</div>

<div id="removeModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(100,80,30,.35);backdrop-filter:blur(3px);align-items:center;justify-content:center;">
  <div style="background:var(--card);border:3px solid var(--border);border-radius:20px;padding:24px 26px;max-width:360px;width:calc(100% - 32px);box-shadow:0 8px 0 var(--border2),0 12px 36px rgba(100,80,30,.22);text-align:center;">
    <div style="font-size:28px;margin-bottom:10px;">🏝️</div>
    <div style="font-size:14px;font-weight:900;color:var(--text);margin-bottom:6px;" id="removeModalTitle">Remove this machine?</div>
    <div style="font-size:12px;font-weight:600;color:var(--text3);margin-bottom:20px;font-family:'Nunito Sans',sans-serif;" id="removeModalSub"></div>

      <button onclick="confirmRemove()" style="flex:1;padding:11px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;border:2.5px solid #f0a0a0;background:var(--red-bg);color:#b83030;cursor:pointer;">👋 Yes, goodbye!</button>
      <button onclick="closeRemoveModal()" style="flex:1;padding:11px;border-radius:14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;border:2.5px solid var(--border);background:white;color:var(--text2);cursor:pointer;">Nevermind</button>
    </div>
  </div>
</div>

</body>
